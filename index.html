<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c1a;
    --surface: #16132a;
    --card-bg: #1e1a35;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --marble: #f0ece0;
    --text: #e8e4d8;
    --muted: #7a7090;
    --green: #4caf7a;
    --red: #e05a5a;
    --blue: #6b8fd6;
    --panel-bg: #13102a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: 
      radial-gradient(ellipse at 20% 20%, rgba(100, 80, 180, 0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(60, 40, 120, 0.1) 0%, transparent 50%);
  }

  h1 {
    font-family: 'Noto Serif', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--gold);
    text-align: center;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }

  .subtitle {
    color: var(--muted);
    text-align: center;
    margin-bottom: 24px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 0.75rem;
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--muted);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 0.85rem;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }

  .filter-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201, 168, 76, 0.1);
  }

  .progress-bar-wrap {
    width: 100%;
    max-width: 520px;
    height: 3px;
    background: var(--surface);
    border-radius: 2px;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transition: width 0.4s ease;
    border-radius: 2px;
  }

  .progress-text {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin-bottom: 20px;
    letter-spacing: 0.08em;
  }

  .card-scene {
    width: 100%;
    flex: 1;
    min-width: 0;
    max-width: 480px;
    height: 260px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 0;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-scene.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 28px 48px;
    border: 1px solid rgba(201, 168, 76, 0.2);
    background: var(--card-bg);
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .card-front::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius: 16px 16px 0 0;
  }

  .card-back {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, #1a1630, #221e3a);
  }

  /* card-bottom-bar: flags + info button embedded in card */
  .card-bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .card-flags { display: flex; gap: 6px; align-items: center; }

  .card-flag-btn {
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    font-size: 0.72rem;
    font-family: 'Crimson Pro', serif;
    letter-spacing: 0.04em;
    cursor: pointer;
    color: rgba(255,255,255,0.25);
    transition: all 0.16s;
    white-space: nowrap;
  }
  .card-flag-btn:hover { color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.2); }
  .card-flag-btn.studying-active { color: var(--gold); border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.08); }
  .card-flag-btn.known-active { color: var(--green); border-color: rgba(76,175,122,0.5); background: rgba(76,175,122,0.08); }

  .card-info-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid rgba(107,143,214,0.3);
    background: transparent;
    color: rgba(107,143,214,0.5);
    font-family: 'Noto Serif', serif;
    font-style: italic;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.16s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-info-btn:hover { color: var(--blue); border-color: var(--blue); background: rgba(107,143,214,0.1); }
  .card-info-btn.info-open { color: var(--blue); border-color: var(--blue); background: rgba(107,143,214,0.15); }

  .card-category {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--gold);
    margin-bottom: 12px;
    opacity: 0.8;
  }

  .card-word {
    font-family: 'Noto Serif', serif;
    font-size: clamp(2rem, 7vw, 3.2rem);
    color: var(--marble);
    text-align: center;
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .card-hint { color: var(--muted); font-size: 0.85rem; font-style: italic; }
  .card-article { color: rgba(107,143,214,0.55); font-family: 'Noto Serif', serif; font-size: clamp(1.1rem,3.5vw,1.6rem); margin-right: 0.2em; vertical-align: baseline; }
  .card-word.is-number { font-size: clamp(3rem, 12vw, 5rem); letter-spacing: -0.02em; }

  .card-translation {
    font-family: 'Noto Serif', serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    color: var(--gold-light);
    text-align: center;
    margin-bottom: 10px;
  }

  .card-transliteration { display: none; }

  .card-example {
    color: var(--muted);
    font-size: 0.82rem;
    text-align: center;
    font-style: italic;
    margin-top: 8px;
    max-width: 320px;
    line-height: 1.5;
  }

  .flip-hint {
    color: var(--muted);
    font-size: 0.72rem;
    text-align: center;
    margin: 6px 0 10px;
    letter-spacing: 0.08em;
    opacity: 0.6;
  }

  /* ===== TOP CONTROLS ===== */
  .top-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    width: 100%;
    max-width: 520px;
  }

  /* category filter pills */
  .filter-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--muted);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 0.82rem;
    transition: all 0.18s;
    letter-spacing: 0.04em;
  }
  .filter-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }

  /* status filter (multi-select pills) */
  .status-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 12px;
  }

  .sflt-btn {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 0.78rem;
    transition: all 0.18s;
    letter-spacing: 0.04em;
  }
  .sflt-btn:hover { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.6); }
  .sflt-btn.active-all { color: var(--text); border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); }
  .sflt-btn.active-studying { color: var(--gold); border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.08); }
  .sflt-btn.active-known { color: var(--green); border-color: rgba(76,175,122,0.5); background: rgba(76,175,122,0.08); }
  .sflt-btn.active-unseen { color: var(--blue); border-color: rgba(107,143,214,0.5); background: rgba(107,143,214,0.08); }

  /* direction toggle — small, tucked in top-row */
  .dir-toggle {
    display: flex;
    gap: 2px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 2px;
  }
  .dir-btn {
    padding: 3px 10px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    transition: all 0.15s;
  }
  .dir-btn.active { background: rgba(255,255,255,0.09); color: var(--text); }

  /* ===== CARD LAYOUT ===== */
  .card-scene {
    width: 100%;
    max-width: 480px;
    height: 260px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 0;
  }

  /* nav row: prev / card / next — card takes flex space */
  .card-nav-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 520px;
    margin-bottom: 4px;
  }

  .btn-nav {
    width: 40px; height: 40px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
    color: rgba(255,255,255,0.4);
    font-size: 1.4rem;
    line-height: 1;
    cursor: pointer;
    transition: all 0.16s;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
  }
  .btn-nav:hover { background: rgba(255,255,255,0.08); color: var(--gold); border-color: rgba(201,168,76,0.4); }

  .card-scene-wrap { flex: 1; min-width: 0; }

  /* ===== GRAMMAR STANDALONE PANEL ===== */
  .grammar-standalone {
    width: 100%;
    background: var(--panel-bg);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), padding 0.3s, margin 0.3s;
    padding: 0 28px;
    box-sizing: border-box;
  }
  .grammar-standalone.open {
    max-height: 900px;
    padding: 20px 28px 24px;
    margin-top: 16px;
    overflow-y: auto;
  }
  .grammar-standalone::-webkit-scrollbar { width: 4px; }
  .grammar-standalone::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

  /* ===== STATS ===== */
  .stats {
    display: flex;
    gap: 18px;
    color: var(--muted);
    font-size: 0.8rem;
    margin: 8px 0 16px;
    letter-spacing: 0.05em;
  }
  .stat span { font-weight: 600; }
  .stat .green { color: var(--green); }
  .stat .yellow { color: var(--gold-light); }
  .stat .blue { color: var(--blue); }

  .btn-reset-corner {
    position: fixed;
    bottom: 14px; right: 16px;
    background: none;
    border: none;
    color: rgba(122,112,144,0.28);
    font-family: 'Crimson Pro', serif;
    font-size: 0.68rem;
    cursor: pointer;
    letter-spacing: 0.07em;
    transition: color 0.2s;
    z-index: 10;
  }
  .btn-reset-corner:hover { color: var(--red); }

  .btn-trainer-link {
    position: fixed;
    top: 16px; right: 16px;
    padding: 7px 16px;
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 20px;
    color: var(--gold);
    font-family: 'Crimson Pro', serif;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
    text-decoration: none;
    background: rgba(14,12,26,0.85);
    backdrop-filter: blur(6px);
    z-index: 100;
    transition: background 0.2s, border-color 0.2s;
  }
  .btn-trainer-link:hover {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
  }

  /* ===== GRAMMAR PANEL STYLES (reused inside inline) ===== */
  .grammar-word-header {
    font-family: 'Noto Serif', serif;
    font-size: 1.5rem;
    color: var(--gold);
    margin-bottom: 2px;
  }
  .grammar-word-ru { color: var(--muted); font-size: 0.85rem; margin-bottom: 3px; font-style: italic; }
  .grammar-word-translit { color: var(--blue); font-size: 0.8rem; margin-bottom: 14px; letter-spacing: 0.05em; }
  .grammar-section-title {
    font-family: 'Noto Serif', serif;
    font-size: 0.9rem;
    color: var(--gold-light);
    margin: 14px 0 8px;
    padding-bottom: 3px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }
  .gtable { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin-bottom: 8px; }
  .gtable th { background: rgba(201,168,76,0.07); color: var(--gold); font-weight:600; padding:6px 10px; text-align:left; font-family:'Crimson Pro',serif; font-size:0.72rem; text-transform:uppercase; letter-spacing:0.05em; border-bottom:1px solid rgba(201,168,76,0.12); }
  .gtable td { padding:6px 10px; border-bottom:1px solid rgba(255,255,255,0.04); color:var(--text); vertical-align:top; white-space:nowrap; }
  .gtable tr:last-child td { border-bottom:none; }
  .gtable td.label { color:var(--muted); font-size:0.78rem; white-space:nowrap; width:100px; }
  .gtable td.greek { font-family:'Noto Serif',serif; font-size:1rem; color:var(--marble); white-space:nowrap; }
  .gtable td.translit { color:var(--blue); font-size:0.78rem; }
  .gtable td.meaning { color:var(--muted); font-size:0.78rem; font-style:italic; }
  .grammar-note { background:rgba(107,143,214,0.07); border:1px solid rgba(107,143,214,0.18); border-radius:6px; padding:8px 12px; color:var(--muted); font-size:0.8rem; line-height:1.55; margin-top:10px; }
  .no-table-msg { color:var(--muted); font-style:italic; font-size:0.85rem; padding:6px 0 3px; line-height:1.5; }
  .tab-row { display:flex; gap:5px; margin-bottom:10px; flex-wrap:wrap; }
  .tab-btn { padding:4px 10px; border-radius:5px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:var(--muted); cursor:pointer; font-family:'Crimson Pro',serif; font-size:0.78rem; transition:all 0.18s; }
  .tab-btn.active { background:rgba(201,168,76,0.12); border-color:var(--gold); color:var(--gold); }

  .game-area { width: 100%; max-width: 780px; display: flex; flex-direction: column; align-items: center; }

  .btn-shuffle {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(107,143,214,0.35);
    background: transparent;
    color: rgba(107,143,214,0.55);
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    transition: all 0.18s;
  }
  .btn-shuffle:hover { border-color: var(--blue); color: var(--blue); background: rgba(107,143,214,0.08); }
</style>
</head>
<body>

<h1>Ελληνικά</h1>
<p class="subtitle">Greek Essential Words</p>

<!-- category filters -->
<div class="filters" id="filters"></div>

<!-- status filters (multi-select) + direction toggle -->
<div class="top-row">
  <div class="dir-toggle">
    <button class="dir-btn active" onclick="setMode('el-ru')" id="mode-el-ru">ΕΛ→РУ</button>
    <button class="dir-btn" onclick="setMode('ru-el')" id="mode-ru-el">РУ→ΕΛ</button>
  </div>
  <button class="btn-shuffle" id="shuffleBtn" onclick="toggleShuffle()" title="Перемешать карточки">⇄ Перемешать</button>
</div>

<div class="status-filters">
  <button class="sflt-btn active-all" id="sf-all" onclick="toggleStatusFilter('all')">Все</button>
  <button class="sflt-btn" id="sf-unseen" onclick="toggleStatusFilter('unseen')">Новые</button>
  <button class="sflt-btn" id="sf-studying" onclick="toggleStatusFilter('studying')">📌 К изучению</button>
  <button class="sflt-btn" id="sf-known" onclick="toggleStatusFilter('known')">✓ Знаю</button>
</div>

<div class="game-area" id="gameArea">
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <p class="progress-text" id="progressText">0 / 0</p>

  <div class="card-nav-row">
    <button class="btn-nav" onclick="prevCard()">‹</button>
    <div class="card-scene-wrap">
      <div class="card-scene" id="cardScene" onclick="flipCard()">
        <div class="card-inner">
          <div class="card-face card-front">
            <div class="card-category" id="frontCategory"></div>
            <div class="card-word" id="frontWord"></div>
            <div class="card-hint" id="frontHint"></div>
            <div class="card-bottom-bar">
              <div class="card-flags">
                <button class="card-flag-btn" id="studyingBtn" onclick="ev(event,toggleStudying)" title="К изучению">📌 К изучению</button>
                <button class="card-flag-btn" id="knownBtn" onclick="ev(event,toggleKnown)" title="Знаю">✓ Знаю</button>
              </div>
              <button class="card-info-btn" id="infoBtn" onclick="ev(event,toggleGrammar)" title="Таблица">i</button>
            </div>
          </div>
          <div class="card-face card-back">
            <div class="card-category" id="backCategory"></div>
            <div class="card-word card-translation" id="backTranslation"></div>
            <div class="card-transliteration" id="backTranslit"></div>
            <div class="card-example" id="backExample"></div>
            <div class="card-bottom-bar">
              <div class="card-flags">
                <button class="card-flag-btn" id="studyingBtn2" onclick="ev(event,toggleStudying)" title="К изучению">📌 К изучению</button>
                <button class="card-flag-btn" id="knownBtn2" onclick="ev(event,toggleKnown)" title="Знаю">✓ Знаю</button>
              </div>
              <button class="card-info-btn" id="infoBtn2" onclick="ev(event,toggleGrammar)" title="Таблица">i</button>
            </div>
          </div>
        </div>
      </div>

    </div>
    <button class="btn-nav" onclick="nextCard()">›</button>
  </div>

  <p class="flip-hint" id="flipHint">↕ нажми на карточку, чтобы перевернуть</p>

  <div class="stats">
    <div class="stat">Знаю: <span class="green" id="statKnown">0</span></div>
    <div class="stat">К изучению: <span class="yellow" id="statStudying">0</span></div>
    <div class="stat">Новые: <span class="blue" id="statUnseen">0</span></div>
    <div class="stat">Всего: <span id="statTotal">0</span></div>
  </div>

  <!-- standalone grammar panel -->
  <div class="grammar-standalone" id="grammarInline">
    <div id="grammarContent"></div>
  </div>
</div>

<button class="btn-reset-corner" onclick="clearProgress()">↺ сброс</button>
<a href="trainer.html" class="btn-trainer-link">Грамматика</a>


<!-- ════════════════════════════════════════════════════════════
     ДАННЫЕ: все слова и грамматика — редактировать в flashcards-data.js
     ════════════════════════════════════════════════════════════ -->
<script src="flashcards-data.js"></script>

<!-- ════════════════════════════════════════════════════════════
     ЛОГИКА: приложение — не редактировать
     ════════════════════════════════════════════════════════════ -->
<script src="flashcards-app.js"></script>

</body>
</html>
